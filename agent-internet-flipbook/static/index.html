<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 互联网 — 视觉浏览器</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #2a2a3a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #4da6ff;
      --accent-dim: #336699;
      --good: #2ecc71;
      --warn: #f39c12;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .logo span:first-child { color: var(--accent); }
    .logo span:last-child { color: var(--text-dim); font-size: 12px; margin-left: 8px; }

    .env-badges {
      display: flex;
      gap: 6px;
    }
    .env-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .env-badge.online { background: rgba(46,204,113,0.15); color: var(--good); }
    .env-badge.offline { background: rgba(243,156,18,0.15); color: var(--warn); }

    /* Hero / Search */
    .hero {
      text-align: center;
      padding: 48px 24px 32px;
      max-width: 700px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #66ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin: 24px 0;
    }
    .search-box input {
      flex: 1;
      padding: 12px 20px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box button {
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .search-box button:hover { opacity: 0.9; }
    .search-box button:disabled { opacity: 0.4; cursor: not-allowed; }

    .quick-searches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .quick-searches button {
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-searches button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Page Canvas */
    .canvas-container {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }
    .canvas-container.active { display: block; }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
    }
    .page-meta {
      font-size: 12px;
      color: var(--text-dim);
    }

    .image-stage {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: crosshair;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }

    .image-stage img {
      width: 100%;
      display: block;
    }

    /* Click overlay regions */
    .click-region {
      position: absolute;
      border: 2px solid rgba(77,166,255,0.4);
      border-radius: 8px;
      background: rgba(77,166,255,0.06);
      transition: all 0.15s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .click-region:hover {
      border-color: var(--accent);
      background: rgba(77,166,255,0.15);
    }
    .click-region .region-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      pointer-events: none;
      padding: 2px 6px;
    }

    /* Data sidebar */
    .data-bar {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .data-card {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .data-card .card-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .data-card .card-value {
      font-size: 16px;
      font-weight: 700;
    }
    .data-card .card-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Raw data toggle */
    .raw-data-toggle {
      margin-top: 16px;
      text-align: center;
    }
    .raw-data-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      padding: 6px 16px;
      text-decoration: underline;
    }
    .raw-data {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
      font-family: 'SF Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .raw-data.show { display: block; }

    /* Loading */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,15,0.8);
      z-index: 200;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.active { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-dim);
      font-size: 14px;
    }
    .loading-steps {
      font-size: 12px;
      color: var(--accent-dim);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 24px; }
      .search-box { flex-direction: column; }
      .data-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <span>🔷 Agent 互联网</span>
      <span>视觉浏览器 L3</span>
    </div>
    <div class="env-badges">
      <span class="env-badge online" id="badge-aep">AEP</span>
      <span class="env-badge online" id="badge-flipbook">Flipbook</span>
    </div>
  </header>

  <!-- Hero Search -->
  <div class="hero" id="hero">
    <h1>Agent 互联网 · 人类入口</h1>
    <p>
      AEP/1.0 真实数据 + AI 生成视觉页面。<br>
      价格、配置、评价全部来自真实发布者，非 AI 编造。
    </p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="例如：适合爬山的运动手表、翻译服务、Python课程" 
             onkeydown="if(event.key==='Enter')search()">
      <button onclick="search()" id="searchBtn">探索</button>
    </div>
    <div class="quick-searches">
      <button onclick="quickSearch('手机')">📱 手机</button>
      <button onclick="quickSearch('摄影服务')">📸 摄影服务</button>
      <button onclick="quickSearch('免费课程')">📚 免费课程</button>
      <button onclick="quickSearch('设计服务')">🎨 设计服务</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-container" id="canvas">
    <div class="page-header">
      <div class="page-title" id="pageTitle"></div>
      <div class="page-meta" id="pageMeta"></div>
    </div>
    <div class="image-stage" id="imageStage">
      <img id="pageImage" src="" alt="AI-generated visual page">
    </div>
    <div class="data-bar" id="dataBar"></div>
    <div class="raw-data-toggle">
      <button onclick="toggleRawData()">查看底层 AEP 数据</button>
    </div>
    <pre class="raw-data" id="rawData"></pre>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">正在搜索 Agent 互联网...</div>
    <div class="loading-steps" id="loadingSteps"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentPage = null;

    function showLoading(text) {
      document.getElementById('loading').classList.add('active');
      document.getElementById('loadingText').textContent = text;
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('active');
    }

    function updateLoadingStep(step) {
      const el = document.getElementById('loadingSteps');
      el.textContent = step;
    }

    async function checkStatus() {
      try {
        const r = await fetch(`${API_BASE}/api/v1/status`);
        const d = await r.json();
        document.getElementById('badge-flipbook').className = 
          'env-badge ' + (d.status === 'ok' ? 'online' : 'offline');
        document.getElementById('badge-flipbook').textContent = 
          d.status === 'ok' ? 'Flipbook ✓' : 'Flipbook ✗';
      } catch(e) {
        document.getElementById('badge-flipbook').className = 'env-badge offline';
        document.getElementById('badge-flipbook').textContent = 'Flipbook ✗';
      }
    }

    async function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      await renderPage(query);
    }

    async function quickSearch(q) {
      document.getElementById('searchInput').value = q;
      await renderPage(q);
    }

    async function renderPage(query) {
      showLoading('正在搜索 Agent 互联网...');
      updateLoadingStep('⏳ 查询 AEP/1.0 内容层...');

      try {
        const resp = await fetch(`${API_BASE}/api/v1/render`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, output_locale: 'zh-CN', aspect_ratio: '16:9' }),
        });

        // Read SSE
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalData = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));
            if (data.type === 'status') {
              const stageMap = {
                'searching_aep': '⏳ 正在搜索 Agent 互联网...',
                'resolving_click': '🔍 识别点击区域...',
                'planning': '🧠 AI 正在规划页面布局...',
                'generating_image': '🎨 生成视觉插画...',
              };
              updateLoadingStep(stageMap[data.stage] || data.stage);
            } else if (data.type === 'final') {
              finalData = data;
            } else if (data.type === 'error') {
              alert('错误: ' + data.message);
              hideLoading();
              return;
            }
          }
        }

        if (!finalData) {
          alert('生成失败，请重试');
          hideLoading();
          return;
        }

        showPage(finalData);
        hideLoading();
        document.getElementById('canvas').classList.add('active');

      } catch (e) {
        console.error(e);
        alert('请求失败: ' + e.message);
        hideLoading();
      }
    }

    function showPage(data) {
      currentPage = data;

      document.getElementById('pageTitle').textContent = data.page_title;
      document.getElementById('pageMeta').textContent = 
        `来自 ${data.source_data.length} 个 AEP 发布者 · ${data.metadata.aep_results_count} 条内容`;

      document.getElementById('pageImage').src = data.image_data_url;

      // Click regions
      const stage = document.getElementById('imageStage');
      stage.querySelectorAll('.click-region').forEach(el => el.remove());

      data.click_regions.forEach(r => {
        const div = document.createElement('div');
        div.className = 'click-region';
        div.style.left = (r.x_pct * 100) + '%';
        div.style.top = (r.y_pct * 100) + '%';
        div.style.width = (r.width_pct * 100) + '%';
        div.style.height = (r.height_pct * 100) + '%';

        const label = document.createElement('span');
        label.className = 'region-label';
        label.textContent = r.label;
        div.appendChild(label);

        div.addEventListener('click', () => handleRegionClick(r));
        stage.appendChild(div);
      });

      // Data cards
      const bar = document.getElementById('dataBar');
      bar.innerHTML = '';
      data.source_data.slice(0, 4).forEach(d => {
        const card = document.createElement('div');
        card.className = 'data-card';
        card.innerHTML = `
          <div class="card-label">${d.publisher || '发布者'}</div>
          <div class="card-value">${d.name}</div>
          ${d.price ? `<div class="card-sub">¥${d.price}</div>` : ''}
          ${d.rating ? `<div class="card-sub">⭐ ${d.rating}</div>` : ''}
        `;
        bar.appendChild(card);
      });

      // Raw data
      document.getElementById('rawData').textContent = JSON.stringify(data.source_data, null, 2);
    }

    async function handleRegionClick(region) {
      if (!currentPage) return;
      const query = region.query || region.label;

      showLoading('正在探索: ' + query);
      updateLoadingStep('🔍 视觉模型识别点击区域...');

      try {
        // 用当前页面 + 点击坐标
        const resp = await fetch(`${API_BASE}/api/v1/click`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            page_id: currentPage.page_id,
            x_pct: (region.x_pct + region.width_pct / 2),
            y_pct: (region.y_pct + region.height_pct / 2),
            output_locale: 'zh-CN',
          }),
        });

        const data = await resp.json();
        if (data.next_page) {
          showPage(data.next_page);
        }
        hideLoading();
      } catch (e) {
        // 如果 click API 失败，回退到 render
        console.warn('click API failed, fallback to render:', e);
        await renderPage(query);
      }
    }

    function toggleRawData() {
      document.getElementById('rawData').classList.toggle('show');
    }

    // Init
    checkStatus();

    // Handle image click for arbitrary position
    document.getElementById('imageStage').addEventListener('click', async function(e) {
      if (!currentPage) return;
      // Only handle clicks not on existing regions
      if (e.target.closest('.click-region')) return;
      
      const rect = this.getBoundingClientRect();
      const x_pct = (e.clientX - rect.left) / rect.width;
      const y_pct = (e.clientY - rect.top) / rect.height;

      showLoading('探索中...');
      updateLoadingStep('🔍 视觉模型识别点击位置...');

      try {
        const resp = await fetch(`${API_BASE}/api/v1/click`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            page_id: currentPage.page_id,
            x_pct: x_pct,
            y_pct: y_pct,
            output_locale: 'zh-CN',
          }),
        });
        const data = await resp.json();
        if (data.next_page) showPage(data.next_page);
        hideLoading();
      } catch (e) {
        hideLoading();
      }
    });
  </script>
</body>
</html>
